<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ファンアート投稿 - OCFA</title>

  <meta
    name="description"
    content="OCFAのファンアート投稿ページです。"
  />

  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="panel">
      <p class="eyebrow">Fan Art</p>
      <h1 id="pageTitle">ファンアートを投稿する</h1>
      <p id="pageLead">
        承認されたクリエイターは、キャラクターへファンアートを投稿できます。
      </p>
    </section>

    <section id="fanartGuide" class="panel" hidden></section>

    <form id="fanartForm" class="panel" hidden>
      <section class="card">
        <h2>描くキャラクター</h2>

        <div id="characterPreview">
          <p>キャラクター情報を読み込み中...</p>
        </div>
      </section>

      <section class="card">
        <h2>ファンアート画像</h2>

        <label class="upload-box">
          <span>画像を選ぶ</span>
          <small>PNG / JPG / WEBP / GIF、5MB未満</small>

          <input
            id="uploadInput"
            type="file"
            accept="image/png,image/jpeg,image/webp,image/gif"
          />
        </label>

        <div id="uploadPreview" class="empty-preview">
          まだ画像が選ばれていません。
        </div>
      </section>

      <section class="card">
        <h2>コメント</h2>

        <textarea
          id="fanartComment"
          rows="5"
          maxlength="1000"
          placeholder="ひとことコメントを書けます。"
        ></textarea>
      </section>

      <div class="button-row">
        <button type="submit" class="primary-btn">
          ファンアートを投稿する
        </button>

        <a class="ghost-btn" href="/characters/">
          キャラ一覧へ
        </a>
      </div>

      <p id="message"></p>
    </form>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="/app.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
