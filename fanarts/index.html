<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ファンアート一覧 - OCFA</title>
  <meta
    name="description"
    content="OCFAに投稿されたファンアート一覧ページです。"
  />

  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="panel">
      <p class="eyebrow">Fan Art</p>
      <h1>ファンアート一覧</h1>

      <p>
        イベントとは別に投稿された、みんなのファンアートを見られます。
      </p>

      <div class="button-row">
        <a class="primary-link" href="/characters/">
          描きたいキャラを探す
        </a>
      </div>
    </section>

    <section class="panel">
      <div id="fanartList" class="fanart-grid">
        <p>ファンアートを読み込み中...</p>
      </div>
    </section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/fanarts.js"></script>
</body>
</html>
