<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ページが見つかりません - OCFA</title>
  <meta name="description" content="OCFAの404ページです。">

  <link rel="stylesheet" href="/style.css">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="not-found-panel panel">
      <p class="eyebrow">404 Not Found</p>

      <div class="not-found-sketch">
        <span>?</span>
      </div>

      <h1>ページが見つかりませんでした</h1>

      <p>
        このページは移動したか、まだ作成されていないようです。<br>
        OCFAのアトリエに戻って、もう一度探してみてください。
      </p>

      <div class="actions">
        <a class="primary-btn" href="/">トップへ戻る</a>
        <a class="ghost-btn" href="/characters/">キャラ一覧を見る</a>
        <a class="ghost-btn" href="/events/">イベントを見る</a>
      </div>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
