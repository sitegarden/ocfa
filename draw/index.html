<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>描く - OCFA</title>
  <meta name="description" content="OCFAでオリジナルキャラクター用の絵を描くページです。">

  <link rel="stylesheet" href="/style.css">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="page-head">
      <p class="eyebrow">Draw</p>
      <h1>まずは絵を描く</h1>
      <p>
        ここで描いた絵は、まだキャラクターではありません。
        気に入った絵だけ、あとからキャラ登録できます。
      </p>
    </section>

    <section class="draw-layout">
      <section class="panel">
        <h2>キャンバス</h2>

        <div class="canvas-tools">
  <div class="tool-mode">
    <button id="penModeBtn" class="tool-active" type="button">ペン</button>
    <button id="eraserModeBtn" type="button">消しゴム</button>
  </div>

  <label>
    色
    <input id="penColor" type="color" value="#3c342e">
  </label>

  <label>
    ペン太さ
    <input id="penSize" type="range" min="1" max="30" value="6">
  </label>

  <label>
  透明度 <span id="opacityValue">100%</span>
  <input id="penOpacity" type="range" min="10" max="100" value="100">
</label>
          
  <label>
    消しゴム太さ
    <input id="eraserSize" type="range" min="4" max="80" value="24">
  </label>

  <button id="undoBtn" type="button">戻す</button>
  <button id="clearBtn" type="button">全消し</button>
</div>

        <div class="canvas-wrap">
  <canvas id="drawCanvas" width="768" height="768"></canvas>
</div>

        <div class="draw-actions">
          <button id="saveDrawingBtn" class="primary-btn" type="button">
            下書き保存
          </button>
          <p id="message" class="message"></p>
        </div>
      </section>

      <section class="panel">
        <h2>保存した絵</h2>
        <p>
          うまく描けた絵だけ「キャラ登録へ」進めます。
          まだキャラにしていない絵は、あとで描き直しできます。
        </p>

        <div id="drawingList" class="drawing-list">
          <p>読み込み中...</p>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/draw.js"></script>
</body>
</html>
