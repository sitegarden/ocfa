<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>作品一覧 - OCFA</title>
  <meta
    name="description"
    content="OCFAの作品一覧ページです。"
  />

  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="panel">
      <p class="eyebrow">Works</p>
      <h1>作品一覧</h1>

      <p>
        OCの世界観やシリーズをまとめた作品一覧です。
        自分専用の作品や、共有作品を探せます。
      </p>

      <div class="button-row">
        <a class="primary-link" href="/works/new/">
          作品を作る
        </a>
      </div>
    </section>

    <section class="panel">
      <div id="workList" class="work-grid">
        <p>作品を読み込み中...</p>
      </div>
    </section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/works.js"></script>
</body>
</html>
