<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>作品にキャラを追加 - OCFA</title>
  <meta
    name="description"
    content="OCFAの作品にキャラクターを追加するページです。"
  />

  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="panel">
      <p class="eyebrow">Works</p>
      <h1>作品にキャラを追加</h1>
      <p>
        自分のキャラクターを、この作品に所属させられます。
      </p>
    </section>

    <section id="workInfo" class="panel">
      <p>作品情報を読み込み中...</p>
    </section>

    <section class="panel">
      <h2>追加するキャラクターを選ぶ</h2>

      <div id="characterSelectList" class="character-grid">
        <p>キャラクターを読み込み中...</p>
      </div>

      <p id="message"></p>
    </section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/work-add-character.js"></script>
</body>
</html>
