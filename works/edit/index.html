<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>作品を編集 - OCFA</title>

  <meta
    name="description"
    content="OCFAの作品編集ページです。"
  />

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">

  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page work-edit-page">
    <section class="panel work-edit-hero">
      <p class="eyebrow">Works</p>
      <h1>作品を編集</h1>
      <p class="lead">
        作品名、説明、共有設定、公開設定を変更できます。
      </p>
    </section>

    <form id="workForm" class="panel work-form" hidden>
      <section class="card">
        <h2>作品名</h2>

        <input
          id="workTitle"
          type="text"
          maxlength="60"
          placeholder="例：星降る街の魔法使い"
          required
        >
      </section>

      <section class="card">
        <h2>作品説明</h2>

        <textarea
          id="workDescription"
          rows="6"
          maxlength="1000"
          placeholder="作品の世界観、雰囲気、登場キャラの方向性などを書けます。"
        ></textarea>
      </section>

      <section class="card">
        <h2>作品タイプ</h2>

        <label class="radio-card">
          <input type="radio" name="workType" value="personal">
          <span>
            <strong>自分専用</strong>
            <small>自分のOCや世界観をまとめる作品です。</small>
          </span>
        </label>

        <label class="radio-card">
          <input type="radio" name="workType" value="shared">
          <span>
            <strong>共有作品</strong>
            <small>他の人のキャラ参加や、うちよそFAを楽しめる作品です。</small>
          </span>
        </label>
      </section>

      <section id="sharedSettings" class="card" hidden>
        <h2>共有作品の参加設定</h2>

        <label class="radio-card">
          <input type="radio" name="joinType" value="free">
          <span>
            <strong>自由参加</strong>
            <small>参加したい人が気軽に入れる作品です。</small>
          </span>
        </label>

        <label class="radio-card">
          <input type="radio" name="joinType" value="approval">
          <span>
            <strong>承認制</strong>
            <small>参加申請を見てから許可する作品です。</small>
          </span>
        </label>

        <label class="radio-card">
          <input type="radio" name="joinType" value="closed">
          <span>
            <strong>募集なし</strong>
            <small>今は参加募集しない作品です。</small>
          </span>
        </label>

        <h3>ルール・注意事項</h3>

        <textarea
          id="rulesText"
          rows="6"
          maxlength="1000"
          placeholder="共有作品のルール、NG、うちよそFAの注意などを書けます。"
        ></textarea>
      </section>

      <section class="card">
        <h2>公開設定</h2>

        <label class="check-line">
          <input id="isPublic" type="checkbox">
          <span>作品を公開する</span>
        </label>

        <p class="form-note">
          非公開にすると、作品一覧や他の人からは見えなくなります。
        </p>
      </section>

      <div class="button-row">
        <button id="saveButton" type="submit" class="primary-btn">
          変更を保存
        </button>

        <a id="backToWorkLink" class="ghost-btn" href="/works/">
          作品ページへ戻る
        </a>
      </div>

      <p id="message" class="form-message"></p>
    </form>

    <section id="pageMessage" class="panel message-card">
      <p class="mini-info">作品情報を読み込み中...</p>
    </section>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="/app.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
