<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>キャラ編集 - OCFA</title>
  <meta name="description" content="OCFAに登録したキャラクター情報を編集できます。">

  <link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/character-edit.css">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="page-head">
      <p class="eyebrow">Edit Character</p>
      <h1>キャラ編集</h1>
      <p>
        登録したキャラクターの紹介文やタグを編集できます。
      </p>
    </section>

    <section id="characterEditContent">
      <div class="panel">
        <p>読み込み中...</p>
      </div>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/character-edit.js"></script>
</body>
