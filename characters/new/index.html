<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>キャラ登録 - OCFA</title>
  <meta name="description" content="保存した下書きにプロフィールを付けて、OCFAのキャラクターとして登録します。">

  <link rel="stylesheet" href="/style.css">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="page-head">
      <p class="eyebrow">Character Register</p>
      <h1>この絵をキャラにする</h1>
      <p>
        保存した下書きに名前やプロフィールを付けて、キャラクターとして登録します。
      </p>
    </section>

    <form id="characterForm" class="form-grid" hidden>
      <section class="panel">
        <h2>キャラ情報</h2>

        <label>
          キャラ名
          <input id="charName" type="text" placeholder="例：星川 ましろ" required>
        </label>

        <label>
          ふりがな
          <input id="charKana" type="text" placeholder="例：ほしかわ ましろ">
        </label>

        <label>
          プロフィール
          <textarea id="charProfile" rows="7" placeholder="性格、設定、世界観、好きなものなど"></textarea>
        </label>

        <label>
          タグ
          <input id="charTags" type="text" placeholder="例：魔法 少女 ほのぼの">
        </label>

        <label class="check-row">
          <input id="faOk" type="checkbox" checked>
          ファンアート歓迎
        </label>

        <label>
          NG・注意事項
          <textarea id="ngText" rows="4" placeholder="例：過度な改変NG、R指定NG、衣装改変は要確認 など"></textarea>
        </label>

        <button class="primary-btn" type="submit">キャラとして登録</button>
        <p id="message" class="message"></p>
      </section>

      <section class="panel">
        <h2>選んだ絵</h2>

        <div id="selectedDrawing" class="selected-drawing">
          <p>読み込み中...</p>
        </div>

        <div class="actions">
          <a class="ghost-btn" href="/draw/">別の絵を描く</a>
        </div>
      </section>
    </form>

    <section id="registerGuide" class="panel">
      <p>キャラ登録する下書きを確認しています...</p>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/character-new.js"></script>
</body>
</html>
