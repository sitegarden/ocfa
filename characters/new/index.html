<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>キャラ登録 - OCFA</title>

  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page">
    <section class="hero small-hero">
      <p class="eyebrow">Character Register</p>
      <h1 id="pageTitle">キャラ登録</h1>
      <p id="pageLead">
        保存した下書き、または許可された画像アップロードからキャラクターを登録します。
      </p>
    </section>

    <section id="registerGuide" class="card message-card">
      キャラ登録の準備をしています...
    </section>

    <form id="characterForm" class="character-register-grid" hidden>
      <section class="card form-card">
        <h2>キャラ情報</h2>

        <label>
          キャラ名
          <input id="charName" type="text" maxlength="40" required />
        </label>

        <label>
          ふりがな
          <input id="charKana" type="text" maxlength="60" />
        </label>

        <label>
          プロフィール
          <textarea id="charProfile" rows="8" maxlength="2000"></textarea>
        </label>

        <label>
          タグ
          <input
            id="charTags"
            type="text"
            maxlength="200"
            placeholder="例：高校生 魔法使い うちの子"
          />
        </label>

        <label class="check-label">
          <input id="faOk" type="checkbox" checked />
          ファンアート歓迎
        </label>

        <label>
          NG・注意事項
          <textarea
            id="ngText"
            rows="5"
            maxlength="1000"
            placeholder="描いてほしくない表現などがあれば書いてください"
          ></textarea>
        </label>

        <button type="submit" class="primary-btn">キャラとして登録</button>
        <p id="message" class="form-message"></p>
      </section>

      <aside class="card preview-card">
        <h2 id="previewTitle">キャラ画像</h2>

        <div id="selectedDrawing">
          読み込み中...
        </div>

        <div id="uploadPanel" class="upload-panel" hidden>
          <label class="upload-box">
            <span>画像を選ぶ</span>
            <small>PNG / JPG / WEBP / GIF、5MB未満</small>
            <input id="uploadInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
          </label>

          <div id="uploadPreview" class="upload-preview">
            まだ画像が選ばれていません。
          </div>

          <p class="note">
            アップロード機能は、運営が許可したユーザーだけ使えます。
          </p>
        </div>

        <div class="preview-actions">
          <a href="/draw/">別の絵を描く</a>
          <a href="/characters/">キャラ一覧へ</a>
        </div>
      </aside>
    </form>
  </main>

  <footer id="siteFooter"></footer>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/character-new.js"></script>
</body>
</html>
